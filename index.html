<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus Pomodoro</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app" aria-label="Pomodoro timer">
    <header class="app__header">
      <h1>Focus Pomodoro</h1>
      <p class="app__subtitle">Stay focused with simple timed sessions.</p>
    </header>

    <section class="timer-card" aria-live="polite">
      <div class="mode-tabs" role="tablist" aria-label="Timer modes">
        <button class="mode-tab is-active" type="button" role="tab" aria-selected="true" data-mode="focus">Focus</button>
        <button class="mode-tab" type="button" role="tab" aria-selected="false" data-mode="shortBreak">Short Break</button>
        <button class="mode-tab" type="button" role="tab" aria-selected="false" data-mode="longBreak">Long Break</button>
      </div>

      <p class="mode-label" data-current-mode>Focus</p>
      <p class="time-display" data-time-display>25:00</p>

      <div class="controls">
        <button class="control-btn control-btn--primary" type="button" data-action="start">Start</button>
        <button class="control-btn" type="button" data-action="pause">Pause</button>
        <button class="control-btn" type="button" data-action="reset">Reset</button>
      </div>

      <p class="daily-stats">Today's focus sessions: <strong data-daily-count>0</strong></p>
    </section>

    <section class="settings-card" aria-label="Timer settings">
      <h2>Settings</h2>
      <form class="settings-form" data-settings-form>
        <label>
          Focus (minutes)
          <input type="number" min="1" max="120" data-setting="focusMinutes" value="25" required>
        </label>
        <label>
          Short break (minutes)
          <input type="number" min="1" max="60" data-setting="shortBreakMinutes" value="5" required>
        </label>
        <label>
          Long break (minutes)
          <input type="number" min="1" max="90" data-setting="longBreakMinutes" value="15" required>
        </label>
        <label>
          Long break every (focus sessions)
          <input type="number" min="2" max="12" data-setting="longBreakInterval" value="4" required>
        </label>
        <button class="control-btn control-btn--primary" type="submit">Save settings</button>
      </form>
      <p class="settings-feedback" data-settings-feedback aria-live="polite"></p>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
